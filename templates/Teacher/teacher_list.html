{% extends 'base.html' %}

{% block content %}
<div class="page-header d-sm-flex d-block align-items-center justify-content-between">
    <h3 class="mb-0">Teacher List</h3>
    <a href="{% url 'add_teacher' %}" class="btn btn-primary mb-3">Add Teacher</a>
</div>
<div class="card">
    <div class="card-body">
        <div class="table-responsive">
            <table class="table table-striped table-hover mb-0">
                <thead class="thead-light">
                    <tr>
                        <th>Name</th>
                        <th>Email</th>
                        <th>Department</th>
                        <th class="text-end">Actions</th>
                    </tr>
                </thead>
                <tbody>
                    {% for teacher in teachers %}
                    <tr>
                        <td>{{ teacher.name }}</td>
                        <td>{{ teacher.email }}</td>
                        <td>{{ teacher.department.name }}</td>
                        <td class="text-end">
                            <a href="{% url 'edit_teacher' teacher.id %}" class="btn btn-warning btn-sm me-1">Edit</a>
                            <a href="{% url 'teacher_detail' teacher.id %}" class="btn btn-info btn-sm me-1">View</a>
                            <a href="{% url 'delete_teacher' teacher.id %}" class="btn btn-danger btn-sm">Delete</a>
                        </td>
                    </tr>
                    {% empty %}
                    <tr><td colspan="4" class="text-center">No teachers available.</td></tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
</div>
{% endblock %}
