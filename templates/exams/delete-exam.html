{% extends 'base.html' %}

{% block content %}
<div class="card">
    <div class="card-header">
        <h3>Delete Exam</h3>
    </div>
    <div class="card-body">
        <p class="alert alert-warning">Are you sure you want to delete the exam "<strong>{{ exam.name }}</strong>"?</p>
        <form method="POST">
            {% csrf_token %}
            <button type="submit" class="btn btn-danger">Yes, Delete</button>
            <a href="{% url 'exams_home' %}" class="btn btn-secondary">Cancel</a>
        </form>
    </div>
</div>
{% endblock %}
