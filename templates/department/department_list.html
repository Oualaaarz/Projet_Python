{% extends 'base.html' %}

{% block content %}
<div class="page-header d-sm-flex d-block align-items-center justify-content-between">
    <h3 class="mb-0">Department List</h3>
    <a href="{% url 'add_department' %}" class="btn btn-primary mb-3">Add Department</a>
</div>
<div class="card">
    <div class="card-body">
        <div class="table-responsive">
            <table class="table table-striped table-hover mb-0">
                <thead class="thead-light">
                    <tr>
                        <th>Name</th>
                        <th class="text-end">Actions</th>
                    </tr>
                </thead>
                <tbody>
                    {% for d in departments %}
                    <tr>
                        <td>{{ d.name }}</td>
                        <td class="text-end">
                            <a href="{% url 'edit_department' d.id %}" class="btn btn-warning btn-sm me-1">Edit</a>
                            <a href="{% url 'delete_department' d.id %}" class="btn btn-danger btn-sm">Delete</a>
                        </td>
                    </tr>
                    {% empty %}
                    <tr><td colspan="2" class="text-center">No departments available.</td></tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
</div>
{% endblock %}
