{% extends 'base.html' %}

{% block content %}
<div class="card">
    <div class="card-header">
        <h3>Delete Timetable Entry</h3>
    </div>
    <div class="card-body">
        <p class="alert alert-warning">Are you sure you want to delete this timetable entry for "<strong>{{ t.subject
                }}</strong>" on {{ t.day }}?</p>
        <form method="POST">
            {% csrf_token %}
            <button type="submit" class="btn btn-danger">Yes, Delete</button>
            <a href="{% url 'timetable_home' %}" class="btn btn-secondary">Cancel</a>
        </form>
    </div>
</div>
{% endblock %}
